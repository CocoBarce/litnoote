<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="inicio.css">
    <link rel="icon" type="image/png" href="./IMGS/Frame 69.png">
    <title>Litnoote</title>
  </head>
  <body>

    <nav class="topnav">
      <div class="brand-mark">
        <img src="./IMGS/Frame 69.png" alt="Litnoote" class="brand-icon">
        <span class="brand-name">Litnoote</span>
      </div>
      <a href="iniciosesion.html" class="nav-login">Iniciar sesión →</a>
    </nav>

    <main class="mi-contenedor">
      <div class="hero-eyebrow">
        <span class="eyebrow-dot"></span>
        Notas colaborativas con quiz por IA
      </div>

      <h1 class="parrafo">
        Escribí,<br>estudiá,<br><em>aprendé.</em>
      </h1>

      <p class="hero-sub">
        Creá tus notas, seleccioná el texto y generá un quiz al instante.<br>
        Colaborativo y en tiempo real.
      </p>

      <div class="btn-group">
        <button class="btniniciar">Empezar ahora</button>
        <button class="btncrear">Crear cuenta</button>
      </div>

      <div class="feature-pills">
        <span class="pill">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
          Quiz con IA
        </span>
        <span class="pill">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          Tiempo real
        </span>
        <span class="pill">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Colaborativo
        </span>
      </div>
    </main>

    <div class="orb orb-1" aria-hidden="true"></div>
    <div class="orb orb-2" aria-hidden="true"></div>
    <div class="orb orb-3" aria-hidden="true"></div>

    <script>
      document.querySelector('.btniniciar').addEventListener('click', () => {
        window.location.href = 'iniciosesion.html';
      });
      document.querySelector('.btncrear').addEventListener('click', () => {
        window.location.href = 'register.html';
      });
    </script>
  </body>
</html>
