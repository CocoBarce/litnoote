<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear cuenta — Litnoote</title>
  <link rel="stylesheet" href="register.css">
  <link rel="icon" type="image/png" href="./IMGS/Frame 69.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>
  <img src="./IMGS/Group 1.png" id="nubeIzquierda" alt="">
  <img src="./IMGS/Group 2.png" id="nubeDerecha" alt="">

  <div id="rectangulo">
    <div class="logo-card">
      <img src="./IMGS/candado.png" alt="Registro">
    </div>
    <h1 class="titulo">Crear cuenta</h1>
    <p class="subtitulo-form">Completá tus datos para registrarte</p>

    <form id="register">
      <div class="input-group">
        <img src="./IMGS/Perfil.png" class="icono" alt="">
        <input type="text" required placeholder="Nombre de usuario" id="username" autocomplete="username">
      </div>

      <div class="input-group">
        <svg class="mail-icon" viewBox="0 0 24 24" aria-hidden="true">
          <rect x="3" y="5" width="18" height="14" rx="3"></rect>
          <path d="m5 8 7 5 7-5"></path>
        </svg>
        <input type="email" required placeholder="Email" id="email" autocomplete="email">
      </div>

      <div class="input-group">
        <img src="./IMGS/candado.png" class="icono" alt="">
        <input type="password" required placeholder="Contraseña" id="password" autocomplete="new-password">
      </div>

      <div class="input-group">
        <img src="./IMGS/candado (1).png" class="icono" alt="">
        <input type="password" required placeholder="Confirmar contraseña" id="password2" autocomplete="new-password">
      </div>

      <button id="registerbtn" type="submit">Crear cuenta</button>
    </form>

    <p class="form-footer">¿Ya tenés cuenta? <a href="iniciosesion.html">Iniciar sesión</a></p>
  </div>

  <div class="toast" id="toast"></div>

  <script src="register.js"></script>
</body>
</html>
